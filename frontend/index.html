<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgriMind Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>AgriMind Dashboard</h1>

    <div class="section">
        <h2>Add Plant</h2>
        <input type="text" id="name" placeholder="Plant Name">
        <input type="text" id="type" placeholder="Plant Type">
        <input type="text" id="city" placeholder="City">
        <button onclick="addPlant()">Add Plant</button>
    </div>

    <div class="section">
        <h2>Diagnose Plant</h2>
        <input type="text" id="diagnose-name" placeholder="Plant Name">
        <input type="file" id="image-file">
        <button onclick="diagnosePlant()">Upload & Diagnose</button>
    </div>

    <h2>Your Plants</h2>
    <div id="plants-container"></div>

    <script src="script.js"></script>
</body>
</html>
